name: GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/cache@v4
        with:
          path: docs/node_modules
          key: ${{ runner.os }}-docs-${{ hashFiles('docs/package.json') }}
          restore-keys: |
            ${{ runner.os }}-docs-

      - uses: actions/configure-pages@v5
        id: pages

      - name: Set VitePress base
        run: echo "VITEPRESS_BASE=${{ steps.pages.outputs.base_path }}" >> "$GITHUB_ENV"

      - run: npm install
        working-directory: docs
      - run: npm run build
        working-directory: docs
        env:
          VITEPRESS_BASE: ${{ env.VITEPRESS_BASE }}

      - run: touch docs/.vitepress/dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist
      - uses: actions/deploy-pages@v4
